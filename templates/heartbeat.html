<!DOCTYPE html>
<html>

<head>
    <title>Heartbeat Recorder</title>
    <link rel="stylesheet" href="/static/heartbeat.css">
</head>

<body>

    <div class="recorder-card">

        <!-- Heart graphic -->
        <div class="heart-wrap" id="heartWrap">
            <div class="heart"></div>
        </div>

        <h2>Recording</h2>
        <div id="status">Ready</div>

        <!-- Wave animation -->
        <div class="wave" id="wave">
            <span></span><span></span><span></span><span></span>
            <span></span><span></span><span></span><span></span>
        </div>

        <div class="controls">
            <button id="start">Start</button>
            <button id="stop">Stop</button>
            <button id="sendAI">Send to AI</button>
        </div>

        <audio id="audio" controls></audio>

    </div>


    <!-- RESULT SECTION -->

    <div class="result-card" id="resultCard">

        <h2>AI Diagnosis</h2>

        <div class="circle" id="circle">
            <span id="percent">0%</span>
        </div>

        <h3 id="diseaseName"></h3>
        <p id="confidenceText"></p>

        <div class="disclaimer">
            AI generated prediction.
            Consult a qualified doctor before making medical decisions.
        </div>

    </div>


    <script>

        let mediaRecorder
        let audioChunks = []

        const startBtn = document.getElementById("start")
        const stopBtn = document.getElementById("stop")
        const sendAI = document.getElementById("sendAI")

        const status = document.getElementById("status")
        const wave = document.getElementById("wave")
        const heart = document.getElementById("heartWrap")


        startBtn.onclick = async () => {

            status.innerText = "Recording..."

            wave.classList.add("recording")
            heart.classList.add("recording")

            const stream = await navigator.mediaDevices.getUserMedia({ audio: true })

            mediaRecorder = new MediaRecorder(stream)
            mediaRecorder.start()

            audioChunks = []

            mediaRecorder.ondataavailable = (event) => {
                audioChunks.push(event.data)
            }

        }


        stopBtn.onclick = () => {

            if (!mediaRecorder) {
                alert("Start recording first")
                return
            }

            mediaRecorder.stop()

            wave.classList.remove("recording")
            heart.classList.remove("recording")

            status.innerText = "Processing..."

            mediaRecorder.onstop = async () => {

                const blob = new Blob(audioChunks, { type: 'audio/webm' })

                document.getElementById("audio").src = URL.createObjectURL(blob)

                const formData = new FormData()
                formData.append("file", blob, "heartbeat.webm")

                await fetch("/upload_heartbeat", {
                    method: "POST",
                    body: formData
                })

                status.innerText = "Recording uploaded"

            }

        }


        sendAI.onclick = async () => {

            status.innerText = "AI analyzing..."

            const res = await fetch("/predict_heart")
            const data = await res.json()

            const confidence = Math.round(data.confidence * 100)

            document.getElementById("percent").innerText = confidence + "%"
            document.getElementById("diseaseName").innerText = data.disease
            document.getElementById("confidenceText").innerText = "Confidence " + confidence + "%"

            document.getElementById("circle").style.background =
                `conic-gradient(#3d8bd9 ${confidence}%, #e6e6e6 ${confidence}%)`

            document.getElementById("resultCard").style.display = "block"

            status.innerText = "Analysis complete"

        }

    </script>

</body>

</html>
