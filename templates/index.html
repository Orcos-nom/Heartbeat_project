<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Audio Recorder</title>

<style>
body{
    font-family: Arial;
    text-align:center;
    background:#f2f2f2;
    margin-top:80px;
}

.container{
    background:white;
    width:420px;
    margin:auto;
    padding:30px;
    border-radius:10px;
    box-shadow:0 0 10px rgba(0,0,0,0.1);
}

button{
    padding:10px 20px;
    margin:10px;
    font-size:16px;
    border:none;
    border-radius:5px;
    cursor:pointer;
}

#start{background:green;color:white;}
#stop{background:red;color:white;}

audio{
    margin-top:20px;
    width:100%;
}
</style>
</head>

<body>

<div class="container">

<h2>Audio Recorder</h2>

<button id="start">Start Recording</button>
<button id="stop" disabled>Stop Recording</button>

<p id="status">Press Start</p>

<audio id="player" controls></audio>

</div>

<script>

let recorder;
let chunks = [];

const startBtn = document.getElementById("start");
const stopBtn = document.getElementById("stop");
const status = document.getElementById("status");
const player = document.getElementById("player");

startBtn.onclick = async function(){

    try{

        const stream = await navigator.mediaDevices.getUserMedia({ audio:true });

        recorder = new MediaRecorder(stream);

        recorder.start();

        status.innerText = "Recording...";

        startBtn.disabled = true;
        stopBtn.disabled = false;

        recorder.ondataavailable = e=>{
            chunks.push(e.data);
        };

    }
    catch(error){

        status.innerText = "Microphone permission denied or not available";

        console.error(error);
    }
};

stopBtn.onclick = function(){

    recorder.stop();

    startBtn.disabled = false;
    stopBtn.disabled = true;

    recorder.onstop = async function(){

        const blob = new Blob(chunks,{type:"audio/webm"});
        chunks = [];

        player.src = URL.createObjectURL(blob);

        const formData = new FormData();
        formData.append("audio_data",blob,"recording.webm");

        await fetch("/upload",{
            method:"POST",
            body:formData
        });

        status.innerText = "Audio uploaded";
    };
};

</script>

</body>
</html>
