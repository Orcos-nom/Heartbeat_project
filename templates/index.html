<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Audio Recorder</title>

<style>
body{
    font-family: Arial;
    background:#f4f4f4;
    text-align:center;
    margin-top:80px;
}

.container{
    background:white;
    width:420px;
    margin:auto;
    padding:30px;
    border-radius:10px;
    box-shadow:0 0 10px rgba(0,0,0,0.1);
}

button{
    padding:10px 20px;
    margin:10px;
    font-size:16px;
    border:none;
    border-radius:6px;
    cursor:pointer;
}

#start{background:#28a745;color:white;}
#stop{background:#dc3545;color:white;}

#status{
    margin-top:15px;
    font-weight:bold;
}

audio{
    margin-top:20px;
    width:100%;
}
</style>
</head>

<body>

<div class="container">

<h2>Audio Recorder</h2>

<button id="start">Start Recording</button>
<button id="stop" disabled>Stop Recording</button>

<audio id="audioPlayback" controls></audio>

<p id="status">Click start to record</p>

</div>

<script>

let recorder;
let chunks = [];

const startBtn = document.getElementById("start");
const stopBtn = document.getElementById("stop");
const statusText = document.getElementById("status");
const audioPlayer = document.getElementById("audioPlayback");

startBtn.onclick = async () => {

    if(!navigator.mediaDevices || !navigator.mediaDevices.getUserMedia){
        statusText.innerText = "Microphone API not supported in this browser";
        return;
    }

    try{

        const stream = await navigator.mediaDevices.getUserMedia({audio:true});

        recorder = new MediaRecorder(stream);

        recorder.start();
        statusText.innerText = "Recording...";

        startBtn.disabled = true;
        stopBtn.disabled = false;

        recorder.ondataavailable = e => {
            chunks.push(e.data);
        };

    }catch(err){

        console.error(err);

        statusText.innerText = "Microphone access denied or not available";
    }
};

stopBtn.onclick = () => {

    recorder.stop();

    startBtn.disabled = false;
    stopBtn.disabled = true;

    recorder.onstop = async () => {

        const blob = new Blob(chunks,{type:"audio/webm"});
        chunks = [];

        const audioURL = URL.createObjectURL(blob);
        audioPlayer.src = audioURL;

        statusText.innerText = "Uploading audio...";

        const formData = new FormData();
        formData.append("audio_data", blob, "recording.webm");

        await fetch("/upload",{
            method:"POST",
            body:formData
        });

        statusText.innerText = "Audio uploaded successfully";
    };
};

</script>

</body>
</html>
