<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Audio Recorder</title>

<style>
body{
font-family:Arial;
text-align:center;
margin-top:80px;
background:#f3f3f3;
}

.container{
background:white;
width:420px;
margin:auto;
padding:30px;
border-radius:10px;
box-shadow:0 0 10px rgba(0,0,0,0.1);
}

button{
padding:10px 20px;
margin:10px;
font-size:16px;
border:none;
border-radius:6px;
cursor:pointer;
}

#start{background:green;color:white;}
#stop{background:red;color:white;}

audio{
width:100%;
margin-top:20px;
}

#status{
margin-top:15px;
font-weight:bold;
}
</style>
</head>

<body>

<div class="container">

<h2>Audio Recorder</h2>

<button id="start">Start Recording</button>
<button id="stop" disabled>Stop Recording</button>

<p id="status">Press Start to record</p>

<audio id="audioPlayer" controls></audio>

</div>

<script>

let recorder;
let chunks=[];

const startBtn=document.getElementById("start");
const stopBtn=document.getElementById("stop");
const status=document.getElementById("status");
const player=document.getElementById("audioPlayer");

startBtn.onclick=async ()=>{

if(!navigator.mediaDevices){
status.innerText="Browser does not support microphone API";
return;
}

if(!window.MediaRecorder){
status.innerText="Recording not supported in this browser";
return;
}

try{

const stream=await navigator.mediaDevices.getUserMedia({audio:true});

recorder=new MediaRecorder(stream);

recorder.start();

status.innerText="Recording...";

startBtn.disabled=true;
stopBtn.disabled=false;

recorder.ondataavailable=e=>{
chunks.push(e.data);
};

}catch(err){

status.innerText="Microphone access denied or unavailable";

console.error(err);

}
};

stopBtn.onclick=()=>{

recorder.stop();

startBtn.disabled=false;
stopBtn.disabled=true;

recorder.onstop=async()=>{

const blob=new Blob(chunks,{type:"audio/webm"});
chunks=[];

player.src=URL.createObjectURL(blob);

const formData=new FormData();
formData.append("audio_data",blob,"recording.webm");

await fetch("/upload",{
method:"POST",
body:formData
});

status.innerText="Audio uploaded";

};
};

</script>

</body>
</html>
